# 售楼中心 VIP 分级欢迎策略
# 人员等级（priority 越高越优先）：executive > director > sales_director > consultant > vip_customer > regular_customer > first_visit

vip_level:

  executive:
    label: 集团领导
    priority: 100
    strategy:
      tone: 隆重恭敬
      gesture:
        turn_head_angle: 30
        actions: [turn_head, wave]
      escort: 通知项目总及全体在岗管理层至主入口迎候
      route: 专属通道 → 贵宾洽谈室 → 沙盘简报（5分钟内）
      duration: 全程陪同，不主动结束
      notes: 禁止促销话术，仅做项目概况与礼遇安排
    welcomes:
      - "{name}，恭迎莅临指导。项目总已在贵宾厅等候，请随我这边走。"
      - "{name}，欢迎光临。今日现场已为您清场接待，敬请指正。"
      - "{name}，您好。集团领导到访，我们已做好完整汇报准备。"
      - "{name}，恭候光临。您的行程我们已逐条落实，请这边请。"
      - "{name}，欢迎莅临检视。案场全体已就位，听候您的指示。"
      - "{name}，您好。今日参观动线已按最高规格安排，无需等候。"
      - "{name}，恭迎莅临。贵宾洽谈室已备好，请先行落座。"
      - "{name}，欢迎光临销售中心。您的到访是今日最重要的安排。"
      - "{name}，您好。项目核心数据与进展，已整理成册供您过目。"
      - "{name}，恭候多时。这边请，我们为您预留了专属参观时段。"

  director:
    label: 开发商领导
    priority: 90
    strategy:
      tone: 正式礼遇
      gesture:
        turn_head_angle: 28
        actions: [turn_head, wave]
      escort: 通知项目总及销售负责人至沙盘区迎候
      route: 沙盘区 → 核心样板 → 洽谈区
      duration: 专人陪同，优先响应提问
      notes: 突出项目品质与工程进度，避免过度推销
    welcomes:
      - "{name}，欢迎莅临指导。项目总已在沙盘区等候，请这边请。"
      - "{name}，恭迎光临。今日销控与工程进度已为您更新完毕。"
      - "{name}，您好。您的到访我们已提前安排，全程专人陪同。"
      - "{name}，欢迎莅临检视。样板区与实景段均已就绪。"
      - "{name}，恭候光临。您关注的几个关键节点，今日可实地确认。"
      - "{name}，您好。洽谈区已预留席位，请随我入内。"
      - "{name}，欢迎光临。项目整体规划，可按您的关注点重点汇报。"
      - "{name}，恭迎莅临。今日现场安静有序，适合深入交流。"
      - "{name}，您好。您此前提出的意见，我们已逐条梳理回应。"
      - "{name}，欢迎莅临销售中心。这边请，路线已为您编排妥当。"

  sales_director:
    label: 销售总监
    priority: 80
    strategy:
      tone: 专业敬重
      gesture:
        turn_head_angle: 25
        actions: [turn_head, wave]
      escort: 通知销售经理及销冠至接待台
      route: 沙盘区 → 主推样板 → 销控洽谈
      duration: 销售团队协同接待
      notes: 可介绍销售政策与团队业绩，语气专业不谄媚
    welcomes:
      - "{name}，欢迎莅临。销售团队已在沙盘区集合，请这边请。"
      - "{name}，您好。今日销控与来访数据已为您备好。"
      - "{name}，恭迎光临。主推户型与最新政策，可为您简要汇报。"
      - "{name}，欢迎回来。案场今日运转正常，请您检阅。"
      - "{name}，您好。您的到访我们已通知各组负责人。"
      - "{name}，欢迎莅临销售中心。路线从沙盘开始，您看是否合适？"
      - "{name}，恭候光临。洽谈区已就绪，可随时开始交流。"
      - "{name}，您好。今日客户接待节奏平稳，适合您实地感受。"
      - "{name}，欢迎莅临。这边请，我带您与团队在沙盘汇合。"
      - "{name}，您好。您关注的几个户型，今日均可安排入内。"

  consultant:
    label: 销冠顾问
    priority: 70
    strategy:
      tone: 同行尊重
      gesture:
        turn_head_angle: 22
        actions: [turn_head, wave]
      escort: 同事致意，不打扰其带客
      route: 简短寒暄 → 自行活动或协助接待其客户
      duration: 30秒内完成问候
      notes: 不对内部同事做项目推销
    welcomes:
      - "{name}，欢迎回来。今天案场节奏不错，祝您签单顺利。"
      - "{name}，您好，辛苦了。有需要协助接待的客户，随时招呼。"
      - "{name}，欢迎光临。今天沙盘区位置空位多，适合带客。"
      - "{name}，又见面了。新到的物料在洽谈区，您自取即可。"
      - "{name}，您好。今日主推那几户，样板状态都很好。"
      - "{name}，欢迎回来。您先忙，有需要我配合的尽管说。"
      - "{name}，辛苦了。今天光线适合看采光，带客体验会不错。"
      - "{name}，您好。案场今天安静，正适合深度洽谈。"
      - "{name}，欢迎光临。祝您今天接待顺利。"
      - "{name}，又见面了。这边请，您熟悉的路线都开着。"

  vip_customer:
    label: VIP客户
    priority: 60
    strategy:
      tone: 尊贵私密
      gesture:
        turn_head_angle: 25
        actions: [turn_head, wave]
      escort: 一对一专属顾问陪同
      route: 贵宾洽谈区 → 优先样板 → 定制讲解
      duration: 全程跟进，记住偏好
      notes: 使用尊称，提及历史关注户型
    welcomes:
      - "{name}，欢迎莅临。您的专属顾问已在等候，请随我这边走。"
      - "{name}，恭迎光临。今日样板区已为您预留参观时段。"
      - "{name}，很高兴再次见到您。您偏好的户型，今日仍可优先品鉴。"
      - "{name}，欢迎回来。专属茶歇已在洽谈区备好。"
      - "{name}，您好。最新销控中，您关注的那几户仍有选择空间。"
      - "{name}，欢迎莅临品鉴。参观动线已为您单独编排。"
      - "{name}，恭候光临。今日现场为您保留了静谧洽谈席位。"
      - "{name}，您好。价格与政策说明，已按您的需求准备妥当。"
      - "{name}，欢迎光临。景观示范段今日特为您延长开放。"
      - "{name}，很高兴与您重逢。您的到访是我们今日最重要的安排。"

  regular_customer:
    label: 普通客户
    priority: 40
    strategy:
      tone: 专业亲和
      gesture:
        turn_head_angle: 20
        actions: [turn_head, wave]
      escort: 标准接待流程
      route: 沙盘概览 → 自选样板 → 洽谈区
      duration: 按客户节奏，不催促
      notes: 自然交流，避免客服腔
    welcomes:
      - "{name}，欢迎回来。今天想看看沙盘，还是直接去样板区？"
      - "{name}，您好，又见面了。上次您留意的户型，今天可以再看一眼。"
      - "{name}，欢迎再次莅临。项目近况有几处值得您顺路了解。"
      - "{name}，您好。今天现场人不多，正适合慢慢逛、细细选。"
      - "{name}，欢迎回来。您上次问到的采光，今天可以实地感受。"
      - "{name}，很高兴再次见到您。新资料已放在洽谈区。"
      - "{name}，您好。若今天时间有限，我们可以先看最关键的几处。"
      - "{name}，欢迎光临。您关注的户型，今天仍可入内参观。"
      - "{name}，又见面了。今天的节奏，完全按您的时间来。"
      - "{name}，欢迎回来。来，我们先从您最关心的那部分看起。"

  first_visit:
    label: 首次到访客户
    priority: 30
    strategy:
      tone: 温和引导
      gesture:
        turn_head_angle: 18
        actions: [turn_head, wave]
      escort: 标准引导，建立信任
      route: 品牌墙 → 沙盘全貌 → 主推样板
      duration: 15分钟概览，留有余地
      notes: 不急于逼单，强调慢慢看
    welcomes:
      - "{name}，欢迎首次莅临。我先带您看沙盘全貌，有个整体印象。"
      - "{name}，您好，第一次来请别拘束。项目概况我为您简要介绍。"
      - "{name}，欢迎光临销售中心。今日参观按您的节奏来，不必着急。"
      - "{name}，初次到访辛苦了。我们从品牌墙开始，慢慢往里走。"
      - "{name}，您好。首次来访建议先看区位，再看户型。"
      - "{name}，欢迎莅临。路线我来安排，您跟着走就好。"
      - "{name}，第一次来请随意感受。有任何想了解的，随时停下细聊。"
      - "{name}，您好。欢迎走进来，我们不赶时间。"
      - "{name}，欢迎光临本案场。整体规划稍后为您说明。"
      - "您好，欢迎首次莅临。我先带您熟悉一下销售中心布局。"
      - "欢迎光临。第一次来建议先花几分钟看看沙盘全貌。"
      - "您好，欢迎到访。今日开放区域都已就绪，随时可以开始。"
      - "欢迎走进来。项目风格和定位，看过沙盘会直观很多。"
      - "您好。来访辛苦了，我们先从整体上了解一下项目。"
      - "欢迎莅临销售中心。今天的参观，完全按您的兴趣来安排。"

  group:
    label: 多人同时到访
    priority: 50
    strategy:
      tone: 群体分流
      gesture:
        turn_head_angle: 20
        actions: [turn_head, wave]
      escort: 引至前台登记分流
      route: 前台 → 沙盘 → 样板
      duration: 一句群体欢迎，禁止连续报姓名
      notes: 人数≥3时启用 GroupPolicy
    welcomes:
      - "欢迎各位光临。请先在前台登记，我们为您安排参观。"
      - "欢迎各位莅临销售中心。这边请，我先为您介绍整体安排。"
      - "欢迎各位，今天现场开放沙盘和样板区，请随我至接待区。"
      - "欢迎各位到来。当前参观人数较多，请先在前台稍作登记。"
      - "欢迎各位。今天的参观路线我已为您准备好，请这边走。"

# 陌生人（未录入人脸）默认映射等级
defaults:
  unknown_face_level: first_visit
  fallback_level: regular_customer
